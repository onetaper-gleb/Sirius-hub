name: Deploy FastAPI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install client dependencies
        working-directory: client
        run: flutter pub get

      - name: Format Dart code
        working-directory: client
        run: dart format lib test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Format Python code
        run: |
          black backend
          isort backend

      - name: Auto-commit formatting changes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code"
          file_pattern: "client/**/*.dart backend/**/*.py"

  client-tests:
    needs: [format-check]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test

  backend-tests:
    needs: [format-check]
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest

  deploy:
    needs: [client-tests, backend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            git fetch origin
            git checkout main
            git pull origin main
            
            cd backend

            touch .env
            
            sed -i '/FIREBASE_CONFIG_BASE64/d' .env
            
            echo "FIREBASE_CONFIG_BASE64='${{ secrets.FIREBASE_CONFIG_BASE64 }}'" > .env
            echo "DB_USER='${{ secrets.DB_USER }}'" >> .env
            echo "DB_PASSWORD='${{ secrets.DB_PASSWORD }}'" >> .env
            echo "DB_NAME='${{ secrets.DB_NAME }}'" >> .env

            docker compose down
            docker compose up -d --build